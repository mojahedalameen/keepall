kind = "web"
previewPath = "/"
title = "keepall"
version = "1.0.0"
id = "artifacts/keepall"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20390

[services.development]
run = "pnpm --filter @workspace/keepall run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/keepall", "run", "build" ]
publicDir = "artifacts/keepall/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20390"
BASE_PATH = "/"
